<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Kudos">
<meta name="theme-color" content="#F4F6FB">
<title>Kudos</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/kudos-favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="apple-touch-startup-image" href="./icons/icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F6FB; --card:#ffffff; --ink:#1d2b3a; --muted:#7c8aa0;
    --accent:#378ADD; --accent-deep:#185FA5; --good:#1f9d57; --good-deep:#147a42; --good-bg:#E6F7ED;
    --bad:#A32D2D; --bad-bg:#FCEBEB; --line:#E6EAF2; --gold:#BA7517;
    --cream:#FBF4E9; --cream-line:#EFE3CE; --gold-mark:#FFD24A;
    --k1:#378ADD;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:var(--bg);min-height:100%}
  .wrap{max-width:720px;margin:0 auto;padding:14px 14px 120px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 4px 12px}
  .brand{display:flex;align-items:center;gap:9px;color:var(--ink)}
  .brand .logo{width:34px;height:34px;border-radius:9px;display:block;flex:none}
  .brand h1{font-family:'Fredoka';font-weight:600;font-size:20px;margin:0}
  .brand .dateline{font-size:11px;font-weight:800;color:var(--muted);margin-top:1px}
  .gear,.logout{appearance:none;border:none;background:#fff;border:1px solid var(--line);color:var(--ink);width:40px;height:40px;border-radius:13px;font-size:18px;cursor:pointer}
  .gear:active,.logout:active{transform:scale(.92)}
  .center{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;text-align:center}
  .center h2{font-family:'Fredoka';font-size:22px;margin:0}
  .center input{border:2px solid var(--line);border-radius:14px;padding:14px;font-size:18px;text-align:center;width:240px;font-family:'Nunito';font-weight:700;letter-spacing:2px}
  .center input:focus{outline:none;border-color:var(--accent)}
  .bigbtn{appearance:none;border:none;background:var(--accent);color:#fff;border-radius:14px;padding:13px 22px;font-family:'Fredoka';font-weight:600;font-size:16px;cursor:pointer}
  .bigbtn:active{transform:scale(.97)}
  .bigbtn:disabled{background:var(--line);color:var(--muted)}
  .ghostbtn{appearance:none;border:1px solid var(--line);background:#fff;color:var(--accent-deep);border-radius:14px;padding:12px 20px;font-family:'Fredoka';font-weight:600;font-size:15px;cursor:pointer}
  .linkbtn{appearance:none;border:none;background:transparent;color:var(--accent-deep);font-family:'Nunito';font-weight:800;font-size:13px;cursor:pointer;text-decoration:underline}
  .profiles{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:420px}
  .profile{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
  .profile .av{font-size:38px}
  .profile .nm{font-family:'Fredoka';font-weight:600;font-size:16px}
  /* ── Auth + onboarding ── */
  .authcard{background:#fff;border:1px solid var(--line);border-radius:20px;padding:22px;width:100%;max-width:360px;text-align:left;display:flex;flex-direction:column;gap:11px}
  .authcard label{font-weight:800;font-size:12px;color:var(--muted);margin-bottom:-5px}
  .authcard input{border:2px solid var(--line);border-radius:12px;padding:12px;font-size:15px;font-family:'Nunito';font-weight:700;text-align:left;letter-spacing:normal;width:100%}
  .authcard input:focus{outline:none;border-color:var(--accent)}
  .tagline{color:var(--muted);font-weight:700;font-size:14px;max-width:320px}
  .wizard{width:100%;max-width:460px;text-align:left}
  .wizard .steplab{font-weight:800;font-size:12px;letter-spacing:1px;color:var(--accent-deep);text-transform:uppercase}
  .wizard h2{font-family:'Fredoka';font-size:21px;margin:4px 0 2px}
  .wizard .sub{color:var(--muted);font-weight:700;font-size:13px;margin-bottom:12px}
  .agepills{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 14px}
  .agepill{border:2px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;font-family:'Fredoka';font-weight:600;font-size:13px;cursor:pointer;color:var(--ink)}
  .agepill.on{border-color:var(--accent);background:#eaf2fc;color:var(--accent-deep)}
  .choregrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:8px}
  .choreToggle{position:relative;border:2px solid var(--line);background:#fff;border-radius:16px;padding:12px;cursor:pointer;min-height:84px;display:flex;flex-direction:column;justify-content:space-between}
  .choreToggle .emo{font-size:24px}
  .choreToggle .nm{font-family:'Fredoka';font-weight:600;font-size:13px;margin-top:4px}
  .choreToggle .pp{font-weight:800;font-size:11px;color:var(--good-deep);background:var(--good-bg);border-radius:999px;padding:3px 8px;align-self:flex-start;cursor:pointer;border:1px solid transparent}
  .choreToggle .pp:hover{border-color:currentColor}
  .choreToggle .pp.care{color:var(--accent-deep);background:#eaf2fc}
  .choreToggle.sel{border-color:var(--good);background:var(--good-bg)}
  .choreToggle .tk{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;border:2px solid var(--line);background:#fff;display:grid;place-items:center;font-size:11px;color:#fff}
  .choreToggle.sel .tk{background:var(--good);border-color:var(--good)}
  .wizrow{display:flex;gap:9px;margin-top:14px}
  .wizrow .bigbtn,.wizrow .ghostbtn{flex:1}
  .miniform{display:grid;grid-template-columns:54px 1fr;gap:8px;margin:4px 0}
  .miniform.three{grid-template-columns:54px 1fr 80px}
  .miniform input{border:2px solid var(--line);border-radius:12px;padding:11px;font-weight:700;font-size:14px;width:100%;font-family:'Nunito'}
  .miniform input:focus{outline:none;border-color:var(--accent)}
  .toggle{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;color:var(--ink);margin:8px 0}
  .kidpill{display:inline-flex;align-items:center;gap:6px;background:#eaf2fc;color:var(--accent-deep);border-radius:999px;padding:6px 12px;font-weight:800;font-size:13px;margin:0 6px 6px 0}
  .kids{display:flex;gap:10px;margin-bottom:14px}
  .kidtab{flex:1;border:none;cursor:pointer;border-radius:16px;padding:11px 10px;display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);color:var(--ink);font-family:'Fredoka';font-weight:600;font-size:15px}
  .kidtab .av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:17px;background:var(--bg);flex:none}
  .kidtab.active{background:var(--k1);border-color:var(--k1);color:#fff}
  .hero{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px 20px}
  .hero .row1{display:flex;align-items:flex-start;justify-content:space-between}
  .hero .who{font-family:'Fredoka';font-weight:600;font-size:20px;display:flex;align-items:center;gap:8px}
  .hero .pts{text-align:right;line-height:1}
  .hero .pts b{font-family:'Fredoka';font-size:32px;display:block;color:var(--accent-deep)}
  .hero .pts span{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--muted)}
  .meta{display:flex;gap:10px;margin-top:10px;font-weight:800;font-size:12px;flex-wrap:wrap}
  .meta .chip{background:var(--bg);padding:5px 11px;border-radius:999px}
  .power{margin-top:14px}
  .power .bar{height:14px;border-radius:999px;background:var(--bg);overflow:hidden}
  .power .fill{height:100%;border-radius:999px;background:var(--accent);width:0;transition:width .5s}
  .power .lab{display:flex;justify-content:space-between;font-size:11px;font-weight:800;margin-top:6px;color:var(--muted)}
  .recap{background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px 16px;margin-top:12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .recap .title{font-family:'Fredoka';font-weight:600;font-size:13px;color:var(--ink);width:100%;margin-bottom:-2px}
  .recap .stat{display:flex;flex-direction:column;line-height:1.05}
  .recap .stat b{font-family:'Fredoka';font-size:20px}
  .recap .stat span{font-size:10px;font-weight:800;letter-spacing:.4px;color:var(--muted);text-transform:uppercase;margin-top:2px}
  .recap .spark{display:flex;align-items:flex-end;gap:5px;height:40px;margin-left:auto}
  .recap .spark .col{display:flex;flex-direction:column;align-items:center;gap:3px}
  .recap .spark .bar{width:16px;border-radius:4px 4px 2px 2px;min-height:3px}
  .recap .spark .d{font-size:9px;font-weight:800;color:var(--muted)}
  .goalstrip{background:#fff;border:2px solid var(--line);border-radius:18px;padding:13px 16px;margin-top:12px;cursor:default}
  .goalstrip.ready{cursor:pointer}
  .goalstrip .gtop{display:flex;align-items:center;gap:9px;font-family:'Fredoka';font-weight:600;font-size:15px}
  .goalstrip .gtop .emo{font-size:22px}
  .goalstrip .gtop .lab{flex:1}
  .goalstrip .gtop .lab small{display:block;font-family:'Nunito';font-weight:800;font-size:11px;color:var(--muted)}
  .goalstrip .gbar{height:12px;border-radius:999px;background:var(--bg);overflow:hidden;margin-top:10px}
  .goalstrip .gfill{height:100%;border-radius:999px;transition:width .5s}
  .goalstrip .gnum{font-weight:800;font-size:11px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between}
  .reward .pin{position:absolute;top:8px;right:8px;border:none;background:transparent;font-size:15px;cursor:pointer;opacity:.35;line-height:1;padding:2px}
  .reward .pin.on{opacity:1}
  .reward{position:relative}
  .wallhead{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 4px 14px}
  .wallhead h2{font-family:'Fredoka';font-weight:600;font-size:20px;margin:0}
  .wallhead .sub{font-size:11px;font-weight:800;color:var(--muted)}
  .wallgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
  .wallcard{background:#fff;border:2px solid var(--line);border-radius:20px;padding:16px;display:flex;flex-direction:column;gap:7px}
  .wallcard .wname{font-family:'Fredoka';font-weight:600;font-size:18px;display:flex;align-items:center;gap:8px}
  .wallcard .wmeta{display:flex;gap:12px;font-weight:800;font-size:12px;color:var(--muted)}
  .wallcard .wbar{height:12px;border-radius:999px;background:var(--bg);overflow:hidden;margin-top:3px}
  .wallcard .wfill{height:100%;border-radius:999px;transition:width .5s}
  .wallcard .wmsg{font-family:'Fredoka';font-weight:600;font-size:13px}
  .wallcard .wdots{display:flex;flex-wrap:wrap;gap:6px;margin-top:3px}
  .wallcard .wdot{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:18px;background:var(--bg);border:2px solid var(--line);opacity:.4}
  .wallcard .wdot.done{opacity:1}
  .wallcard .wgoal{font-size:11px;font-weight:800;color:var(--muted);margin-top:2px}
  .wallcard .whint{color:var(--muted);font-weight:700;font-size:12px;margin-top:2px}
  .phototag{font-size:11px;margin-left:3px;vertical-align:middle}
  .histphoto{width:48px;height:48px;border-radius:10px;object-fit:cover;border:2px solid var(--line);cursor:pointer;flex:none}
  #lightbox{position:fixed;inset:0;background:rgba(10,16,26,.85);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
  #lightbox.open{display:flex}
  #lightbox img{max-width:100%;max-height:90vh;border-radius:14px}
  .sectionhd{display:flex;align-items:center;justify-content:space-between;margin:20px 4px 10px}
  .sectionhd h2{font-family:'Fredoka';font-weight:600;font-size:17px;margin:0}
  .sectionhd .hint{font-size:12px;font-weight:700;color:var(--muted)}
  .periodgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:4px}
  @media(min-width:560px){.periodgrid{grid-template-columns:repeat(3,1fr)}}
  .periodlab{display:flex;align-items:center;gap:8px;font-family:'Fredoka';font-weight:600;font-size:14px;color:var(--ink);margin:14px 4px 8px}
  .periodlab::after{content:'';flex:1;height:1px;background:var(--line)}
  .periodlab:first-child{margin-top:0}
  .chore{background:#fff;border-radius:18px;padding:14px 13px;box-shadow:none;border:2px solid var(--line);cursor:pointer;position:relative;min-height:108px;display:flex;flex-direction:column;justify-content:space-between}
  .chore:active{transform:scale(.96)}
  .chore .emo{font-size:34px;line-height:1}
  .chore .nm{font-family:'Fredoka';font-weight:600;font-size:15px;margin-top:7px}
  .chore .pp{font-weight:800;font-size:12px;color:var(--good);margin-top:2px}
  .chore.neg .pp{color:var(--bad)}
  .chore.care .pp{color:var(--muted)}
  .stretchtag{display:inline-block;font-size:10px;font-weight:700;color:#7c5cff;background:#7c5cff1a;border-radius:6px;padding:1px 6px;margin-left:4px;vertical-align:middle}
  .proposeBtn{appearance:none;border:1px dashed var(--accent);background:#fff;color:var(--accent-deep);border-radius:13px;padding:10px;font-family:'Fredoka';font-weight:600;font-size:13px;cursor:pointer;width:100%;margin:6px 0 0}
  .chore .tick{position:absolute;top:9px;right:9px;width:24px;height:24px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-size:13px;color:#fff;background:#fff}
  .chore.done{border-color:var(--good);background:var(--good-bg)}
  .chore.done .tick{background:var(--good);border-color:var(--good)}
  .chore.neg.done{border-color:var(--bad);background:var(--bad-bg)}
  .chore.neg.done .tick{background:var(--bad);border-color:var(--bad)}
  .tierlab{color:var(--muted);font-weight:800;font-size:12px;margin:10px 4px 4px}
  .rewards{display:flex;gap:11px;overflow-x:auto;padding:4px 2px 6px}
  .reward{flex:none;width:148px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;display:flex;flex-direction:column;gap:6px}
  .reward .emo{font-size:26px}
  .reward .nm{font-family:'Fredoka';font-weight:600;font-size:14px;line-height:1.15}
  .reward .cost{font-weight:800;font-size:12px;color:var(--gold)}
  .reward button{margin-top:auto;border:none;border-radius:11px;padding:9px;font-family:'Fredoka';font-weight:600;font-size:13px;cursor:pointer;background:var(--accent);color:#fff}
  .reward button:disabled{background:var(--line);color:var(--muted);cursor:not-allowed}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(40px);background:var(--ink);color:#fff;padding:13px 20px;border-radius:14px;font-family:'Fredoka';font-weight:600;opacity:0;transition:.3s;z-index:70;max-width:90%;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .modal{position:fixed;inset:0;background:rgba(20,30,45,.45);z-index:80;display:none;align-items:flex-end;justify-content:center}
  .modal.open{display:flex}
  .sheet{background:#fff;width:100%;max-width:720px;max-height:88vh;overflow-y:auto;border-radius:22px 22px 0 0;padding:18px 16px 30px}
  .sheet h3{font-family:'Fredoka';font-size:19px;margin:4px 4px 14px;display:flex;align-items:center;justify-content:space-between}
  .sheet h3 .x{border:none;background:var(--bg);border-radius:10px;width:32px;height:32px;font-size:16px;cursor:pointer}
  .tabbar{display:flex;gap:6px;background:var(--bg);padding:5px;border-radius:13px;margin:0 4px 14px;flex-wrap:wrap}
  .tabbar button{flex:1;border:none;background:transparent;padding:9px;border-radius:9px;font-family:'Fredoka';font-weight:600;font-size:13px;cursor:pointer;color:var(--muted);min-width:72px}
  .tabbar button.on{background:#fff;color:var(--ink)}
  .panel{display:none}.panel.on{display:block}
  .item{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:13px;padding:10px 12px;margin:0 4px 9px}
  .item .e{font-size:20px}
  .item .t{flex:1;font-weight:700;font-size:14px}
  .item .t small{display:block;color:var(--muted);font-weight:700;font-size:11px}
  .item .del{border:none;background:var(--bad-bg);color:var(--bad);border-radius:8px;width:30px;height:30px;font-size:14px;cursor:pointer}
  .addform{display:grid;grid-template-columns:50px 1fr 65px;gap:7px;margin:6px 4px 4px}
  .addform input{border:2px solid var(--line);border-radius:11px;padding:10px;font-weight:700;font-size:14px;width:100%}
  .addform.four{grid-template-columns:50px 1fr 56px 64px}
  .rewardopts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:6px 4px 4px}
  .addform select,.rewardopts select{border:2px solid var(--line);border-radius:11px;padding:10px;font-weight:700;font-size:14px;width:100%;background:#fff;font-family:'Nunito';color:var(--ink)}
  .addbtn{grid-column:1/-1;border:none;background:var(--accent);color:#fff;border-radius:12px;padding:11px;font-family:'Fredoka';font-weight:600;font-size:14px;cursor:pointer;margin-top:2px}
  .rowbtns{display:flex;gap:8px;margin:10px 4px 0;flex-wrap:wrap}
  .rowbtns button{flex:1;min-width:130px;border:none;border-radius:13px;padding:11px;font-family:'Fredoka';font-weight:600;font-size:13px;cursor:pointer;background:var(--bg);color:var(--ink)}
  .rowbtns button.danger{background:var(--bad-bg);color:var(--bad)}
  .note{color:var(--muted);font-size:12px;font-weight:700;margin:2px 6px 12px;line-height:1.4}
  .empty{color:var(--muted);text-align:center;padding:20px;font-weight:700}
  #fx{position:fixed;inset:0;pointer-events:none;z-index:90;overflow:hidden}
  .fxpiece{position:absolute;font-size:26px;animation:fly .9s ease-out forwards}
  @keyframes fly{0%{opacity:1;transform:translateY(0) scale(.6) rotate(0deg)}100%{opacity:0;transform:translateY(-150px) scale(1.3) rotate(45deg)}}
  .emoji-in{cursor:pointer;text-align:center!important;caret-color:transparent}
  #emojiPick{position:fixed;inset:0;background:rgba(20,30,45,.45);z-index:95;display:none;align-items:center;justify-content:center;padding:20px}
  #emojiPick.open{display:flex}
  .emojisheet{background:#fff;border-radius:20px;padding:16px;width:100%;max-width:340px;max-height:70vh;overflow-y:auto}
  .emojisheet h4{font-family:'Fredoka';font-weight:600;font-size:15px;margin:2px 2px 12px}
  .emojigrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
  .emojibtn{border:none;background:var(--bg);border-radius:12px;font-size:24px;padding:8px 0;cursor:pointer;line-height:1}
  .emojibtn:active{transform:scale(.9)}
  /* ── Landing / marketing page ── */
  .lp{max-width:680px;margin:0 auto}
  .lp-nav{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 0}
  .lp-nav .b{display:flex;align-items:center;gap:9px}
  .lp-nav .b img{width:32px;height:32px;border-radius:9px;display:block}
  .lp-nav .b b{font-family:'Fredoka';font-weight:600;font-size:19px}
  .lp-hero{text-align:center;padding:30px 8px 6px}
  .lp-hero img.mark{width:76px;height:76px;border-radius:19px;margin-bottom:16px}
  .lp-hero h1{font-family:'Fredoka';font-weight:600;font-size:30px;line-height:1.14;margin:0 0 12px}
  .lp-hero .sub{color:var(--muted);font-weight:700;font-size:16px;max-width:440px;margin:0 auto 22px;line-height:1.45}
  .lp-actions{display:flex;flex-direction:column;align-items:center;gap:11px}
  .lp-actions .bigbtn{font-size:17px;padding:15px 30px}
  .lp-trust{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:18px}
  .lp-trust span{font-weight:800;font-size:12px;color:var(--good-deep);background:var(--good-bg);border-radius:999px;padding:5px 11px}
  .lp-sec{padding:34px 4px 0;margin-top:34px;border-top:1px solid var(--line)}
  .lp-sec h2{font-family:'Fredoka';font-weight:600;font-size:26px;letter-spacing:-.4px;margin:0 0 6px;text-align:center}
  .lp-sec .lead{color:var(--muted);font-weight:700;font-size:14px;max-width:420px;margin:0 auto 20px;text-align:center;line-height:1.45}
  .lp-cards{display:grid;grid-template-columns:1fr;gap:12px}
  @media(min-width:540px){.lp-cards{grid-template-columns:1fr 1fr}}

<div class="wrap" id="app"></div>
<div id="fx"></div>

<div id="fbModal" class="modal"><div class="sheet">

    <input id="fbEmail" type="email" inputmode="email" placeholder="you@example.com" autocomplete="email">
    <label class="toggle" style="margin:10px 4px 2px"><input type="checkbox" id="fbFeature"> ⭐ You can feature this on the site</label>
    <div id="fbFeatureFields" style="display:none">
      <p class="note" style="margin:2px 4px 10px">We'll show your note with your first name once it's approved. Nothing goes public without your OK here.</p>
      <label>First name (shown publicly)</label>
      <input id="fbName" placeholder="e.g. Priya" maxlength="80" autocomplete="given-name">
      <label>Role (optional)</label>

async function sha256(text){
  const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

// PINs are salted: a per-profile random salt makes a short PIN's hash
// non-trivial to reverse with a rainbow table.
function genSalt(){
  const a=new Uint8Array(16);crypto.getRandomValues(a);
  return [...a].map(b=>b.toString(16).padStart(2,'0')).join('');
}
const hashPin=(pin,salt)=>sha256(salt+':'+pin);
// Lightweight password-strength hint for the signup field — purely advisory
// (the real minimum is enforced separately). Scores length + character variety.
function pwStrength(p){
  if(!p) return {pct:0,label:'Use 6+ characters — longer is stronger',color:'var(--line)',muted:true};
  if(p.length<6) return {pct:22,label:'Too short',color:'var(--bad)'};
  let s=0;
  if(p.length>=10) s++;
  if(p.length>=14) s++;
  if(/[a-z]/.test(p)&&/[A-Z]/.test(p)) s++;
  if(/\d/.test(p)) s++;
  if(/[^A-Za-z0-9]/.test(p)) s++;
  if(s<=1) return {pct:45,label:'Weak',color:'#d98a00'};
  if(s<=2) return {pct:70,label:'Good',color:'var(--accent)'};
  return {pct:100,label:'Strong 💪',color:'var(--good)'};
}
// Verify a PIN, supporting legacy unsalted hashes (sha256(pin) with no salt).
async function pinMatches(profile,pin){
  if(profile.pin_salt)return (await hashPin(pin,profile.pin_salt))===profile.pin_hash;
  return (await sha256(pin))===profile.pin_hash;
}

// Fetch approved testimonials (RLS lets the anon key read only approved rows) and
// reveal the section only if there are any — so it's never an empty/lonely block.
async function loadTestimonials(){
  const { data, error } = await sb.from('testimonials')
    .select('name,role,quote').eq('approved',true).order('created_at',{ascending:false}).limit(6);
  if(error || !data || !data.length) return;
  const sec=$('#lpTestimonials'); if(!sec) return;
  $('#lpQuotes').innerHTML=data.map(t=>`
    <figure class="lp-quote">
      <p class="q">“${esc(t.quote)}”</p>
      <figcaption class="who"><b>${esc(t.name)}</b>${t.role?`<span>${esc(t.role)}</span>`:''}</figcaption>
    </figure>`).join('');
  sec.style.display='';
}

// ── Feedback (anonymous insert into Supabase; no read access via anon key) ────
function openFeedback(){
  const m=$('#fbModal');
  m.classList.add('open');
  m.onclick=e=>{ if(e.target===m) closeFeedback(); };
  $('#fbClose').onclick=closeFeedback;
  $('#fbSend').onclick=submitFeedback;
  // Reveal the name/role fields only when the "feature this" opt-in is ticked.
  $('#fbFeature').onchange=e=>{ $('#fbFeatureFields').style.display=e.target.checked?'':'none'; };
  setTimeout(()=>$('#fbMsg').focus(),50);
}
function closeFeedback(){ $('#fbModal').classList.remove('open'); }
async function submitFeedback(){
  const msg=$('#fbMsg').value.trim();
  if(!msg){ toast('Add a little note first'); $('#fbMsg').focus(); return; }
  const email=$('#fbEmail').value.trim()||null;
  const feature=$('#fbFeature').checked;
  const name=$('#fbName')?.value.trim();
  if(feature && !name){ toast('Add a first name to feature it'); $('#fbName').focus(); return; }
  const btn=$('#fbSend'); btn.disabled=true; btn.textContent='Sending…';
  // Always record the private note. Only when the user opts in do we also submit a
  // testimonial (approved=false; nothing shows publicly until you approve it).
  const { error } = await sb.from('feedback').insert({ message:msg, email, source:'landing' });
  if(!error && feature){
    await sb.from('testimonials').insert({ name, role:$('#fbRole').value.trim()||null, quote:msg });
  }
  btn.disabled=false; btn.textContent='Send feedback';
  if(error){ toast('Could not send — please try again'); return; }
  $('#fbMsg').value=''; $('#fbEmail').value=''; $('#fbFeature').checked=false;
  $('#fbName').value=''; $('#fbRole').value=''; $('#fbFeatureFields').style.display='none';
  closeFeedback();
  toast(feature?'Thank you! We\'ll review it soon 💛':'Thank you! 💛');
}

// Kick off Google OAuth. This redirects the whole page to Google and back to the
// app's origin; on return boot() picks up the session (and any onboarding stash).
async function signInWithGoogle(btn){
  if(btn){btn.disabled=true;}
  const {error}=await sb.auth.signInWithOAuth({
    provider:'google',
    options:{ redirectTo: window.location.origin+window.location.pathname,
              queryParams:{ prompt:'select_account' } }
  });
  if(error){ if(btn)btn.disabled=false; toast(error.message||'Could not start Google sign-in'); }
  // On success the browser navigates away to Google; nothing after this runs.
}

function renderLogin(){
  document.body.classList.remove('landing');
  app.innerHTML=`
    <div class="center">
      <img src="./icons/icon-192.png" alt="Kudos" style="width:60px;height:60px;border-radius:16px">
      <h2>Welcome back</h2>
      <div class="authcard">
        <button class="gbtn" id="googleBtn">${GOOGLE_SVG}Continue with Google</button>
        <div class="authdiv">or with email</div>
        <label>Email</label>
        <input id="logEmail" type="email" inputmode="email" placeholder="you@example.com" autocomplete="email">
        <label>Password</label>
        <input id="logPass" type="password" placeholder="••••••••" autocomplete="current-password">
        <button class="bigbtn" id="logBtn" style="margin-top:6px">Log in</button>
      </div>
      <button class="linkbtn" id="toStart">New here? Get started</button>
    </div>`;
  $('#toStart').onclick=renderLanding;
  $('#googleBtn').onclick=()=>signInWithGoogle($('#googleBtn'));
  const submit=async()=>{
    const email=$('#logEmail').value.trim(), pass=$('#logPass').value;
    if(!email||!pass)return toast('Enter your email and password');
    $('#logBtn').disabled=true;$('#logBtn').textContent='Logging in…';
    const {error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){$('#logBtn').disabled=false;$('#logBtn').textContent='Log in';return toast(error.message||'Could not log in');}
    boot();
  };
  $('#logBtn').onclick=submit;
  $('#logPass').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
}

// ── Onboarding wizard (value-first: see chores before sign-up) ────────────────
// onboard.kids: [{name, age, emoji, bandKey, daily_goal, pinHash|null, chores:[{emoji,name,points}]}]
let onboard=null;
let wizActiveKid=0;

function startOnboarding(){
  document.body.classList.remove('landing');
  onboard={familyName:'',kids:[blankKid()],parent:null};
  wizActiveKid=0;
  renderWizChores();
}
function blankKid(){
  const b=bandByKey('7-9');
  return {name:'',age:8,emoji:'🦄',bandKey:'7-9',daily_goal:DEFAULT_GOAL_BY_BAND['7-9'],pinHash:null,pinSalt:null,wantsPin:false,
          chores:b.chores.map(c=>({...c}))};
}

// Step 1 + 2 combined: starter chores shown immediately, refine by age inline.
function renderWizChores(){
  const kid=onboard.kids[wizActiveKid];
  const band=bandForAge(kid.age);
  // The available pool follows the chosen age band; selection state persists by name.
  const selected=new Set(kid.chores.map(c=>c.name));
  // Effective points per picked chore — a parent may have flipped stars ↔ daily care.
  const selPts=new Map(kid.chores.map(c=>[c.name,c.points]));
  const pool=band.chores;
  app.innerHTML=`
    <div class="center" style="justify-content:flex-start;padding-top:28px">
      <div class="wizard">
        <div class="steplab">Step 1 of 2 · Kid ${wizActiveKid+1}</div>
        <h2>Here are starter chores</h2>
        <div class="sub">Tap a card to pick it. Basics are set to <b>Daily care</b> (no stars) for older kids — tap the badge to switch whether a task earns stars.</div>
        <div class="agepills" id="agePills">
          ${BANDS.map(b=>`<button class="agepill ${b.key===band.key?'on':''}" data-band="${b.key}">${b.label} yrs</button>`).join('')}
        </div>
        <div class="choregrid" id="choreGrid">
          ${pool.map(c=>{
            const pts=selPts.has(c.name)?selPts.get(c.name):c.points;
            const badge=pts>0?`+${pts} ⭐`:'🩵 Daily care';
            return `
            <div class="choreToggle ${selected.has(c.name)?'sel':''}" data-name="${esc(c.name)}">
              <div class="tk">${selected.has(c.name)?'✓':''}</div>
              <div><div class="emo">${c.emoji}</div><div class="nm">${esc(c.name)}</div></div>
              <div class="pp ${pts>0?'':'care'}" data-flip="${esc(c.name)}" title="Tap to switch stars / daily care">${badge}</div>
            </div>`;}).join('')}
        </div>
        <div class="wizrow">
          <button class="ghostbtn" id="wizBack">Back</button>
          <button class="bigbtn" id="wizNext">Next: name & PIN</button>
        </div>
      </div>
    </div>`;
  document.querySelectorAll('#agePills .agepill').forEach(el=>el.onclick=()=>{
    const b=bandByKey(el.dataset.band);
    kid.bandKey=b.key;kid.age=Math.round((b.lo+Math.min(b.hi,18))/2);
    kid.daily_goal=DEFAULT_GOAL_BY_BAND[b.key];
    // Keep still-valid picks but re-apply this band's age-appropriate points, so a
    // task that's "daily care" for a big kid becomes a star-worthy win for a toddler
    // (and vice-versa). Then add the newly relevant defaults.
    const bandPts=new Map(b.chores.map(c=>[c.name,c.points]));
    const keep=kid.chores.filter(c=>bandPts.has(c.name)).map(c=>({...c,points:bandPts.get(c.name)}));
    const have=new Set(keep.map(c=>c.name));
    kid.chores=[...keep,...b.chores.filter(c=>!have.has(c.name))];
    renderWizChores();
  });
  document.querySelectorAll('#choreGrid .choreToggle').forEach(el=>el.onclick=()=>{
    const nm=el.dataset.name;
    const i=kid.chores.findIndex(c=>c.name===nm);
    if(i>=0)kid.chores.splice(i,1);
    else{const c=pool.find(x=>x.name===nm);if(c)kid.chores.push({...c});}
    renderWizChores();
  });
  // Tapping the badge flips a task between earning stars and being daily care.
  // (Also picks the task if it wasn't selected yet.) stopPropagation so the tile's
  // select/deselect doesn't also fire.
  document.querySelectorAll('#choreGrid .pp').forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const nm=el.dataset.flip;
    let i=kid.chores.findIndex(c=>c.name===nm);
    if(i<0){const pc=pool.find(x=>x.name===nm);if(!pc)return;kid.chores.push({...pc});i=kid.chores.length-1;}
    const cur=kid.chores[i];
    if(cur.points>0){cur.points=0;}
    else{const pc=pool.find(x=>x.name===nm);cur.points=(pc&&pc.points>0)?pc.points:5;}
    renderWizChores();
  });
  $('#wizBack').onclick=()=>{ if(wizActiveKid>0){wizActiveKid--;renderWizChores();} else renderLanding(); };
  $('#wizNext').onclick=()=>{
    if(!kid.chores.length)return toast('Pick at least one chore');
    renderWizKidDetails();
  };
}

// Build the family from a wizard payload (runs authenticated, RLS-scoped to us).
async function createFamilyFromPayload(p){
  const {data:fam,error:fe}=await sb.from('families')
    .insert({owner_user_id:currentUser.id,name:p.familyName||'My Family'}).select().single();
  if(fe)throw fe;
  familyId=fam.id;

  // Parent profile
  await sb.from('profiles').insert({
    family_id:familyId,name:p.parent.name,emoji:p.parent.emoji||'🧑',role:'parent',
    daily_goal:0,pin_hash:p.parent.pinHash,pin_salt:p.parent.pinSalt
  });

  // Kids + their chosen chores
  let kidIndex=0;
  for(const kid of (p.kids||[])){
    if(!kid.name)continue;
    const {data:kp,error:ke}=await sb.from('profiles').insert({
      family_id:familyId,name:kid.name,emoji:kid.emoji||'🦄',role:'kid',
      age:kid.age||null,daily_goal:kid.daily_goal||50,pin_hash:kid.pinHash||null,pin_salt:kid.pinSalt||null,
      color:colorForKidIndex(kidIndex++)
    }).select().single();
    if(ke)throw ke;
    if(kid.chores&&kid.chores.length){
      await sb.from('chores').insert(kid.chores.map(c=>({
        family_id:familyId,profile_id:kp.id,emoji:c.emoji,name:c.name,points:c.points,cadence:'daily'
      })));
    }
  }

  // Shared starter rewards
  await sb.from('rewards').insert(STARTER_REWARDS.map(r=>({
    family_id:familyId,owner:'both',emoji:r.emoji,name:r.name,cost:r.cost,tier:r.tier
  })));
}

function wallCard(k){

  const coreUndone=todays.filter(c=>c.category!=='stretch' && c.points>0 && !doneToday.has(c.id)).length;
  const corePts=todayCorePoints(k.id);
  const pct=Math.max(0,Math.min(100,k.daily_goal?(corePts/k.daily_goal)*100:0));
  const msg=todays.length===0?'No chores today'
    :(coreUndone===0?'All done — superstar! 🌟':`${coreUndone} chore${coreUndone===1?'':'s'} to go!`);
  const dots=todays.length?todays.map(c=>{
    const done=doneToday.has(c.id);
    return `<div class="wdot ${done?'done':''}" ${done?`style="background:${accent}22;border-color:${accent};opacity:1"`:''} title="${esc(c.name)}">${c.emoji}</div>`;
  }).join(''):'<div class="whint">No chores yet — add some in Parent settings</div>';
  const goalR=k.goal_reward_id?rewards.find(r=>r.id===k.goal_reward_id && !r.archived && !r.pending):null;
  const togo=goalR?Math.max(0,goalR.cost-k.total_points):0;
  return `<div class="wallcard">
    <div class="wname" style="color:${accent}">${k.emoji} ${esc(k.name)}</div>
    <div class="wmeta"><span>${k.total_points} ⭐</span><span>🔥 ${k.streak||0} day${(k.streak||0)===1?'':'s'}</span></div>
    <div class="wbar"><div class="wfill" style="width:${pct}%;background:${accent}"></div></div>
    <div class="wmsg" style="color:${accent}">${msg}</div>

    ${goalR?`<div class="wgoal">🎯 Saving for ${esc(goalR.name)} · ${togo>0?togo+' ⭐ to go':'ready! 🎉'}</div>`:''}
  </div>`;
}

const pinAttempts={};
function askPin(p){
  const expLen=p.role==='parent'?6:4;
  app.innerHTML=`
    <div class="center">
      <span style="font-size:38px">${p.emoji}</span>
      <h2>${esc(p.name)}'s PIN</h2>
      <input id="pin" type="password" inputmode="numeric" maxlength="${expLen}" placeholder="${'-'.repeat(expLen)}">
      <button class="bigbtn" id="pinBtn">Unlock</button>

    </div>`;
  $('#backBtn').onclick=renderProfilePicker;
  $('#pinBtn').onclick=async()=>{
    const lock=pinAttempts[p.id];
    if(lock && lock.until>Date.now()){
      toast('Too many tries — wait '+Math.ceil((lock.until-Date.now())/1000)+'s');
      return;
    }
    const v=$('#pin').value.trim();
    if(v.length!==expLen)return toast('PIN is '+expLen+' digits');
    if(!(await pinMatches(p,v))){
      const a=pinAttempts[p.id]||{count:0,until:0};
      a.count++;
      if(a.count>=5){a.until=Date.now()+30000;a.count=0;toast('Too many tries — wait 30s');}
      else toast('Wrong PIN');
      pinAttempts[p.id]=a;
      return;
    }
    // Quietly upgrade a legacy unsalted PIN to a salted hash on successful entry.
    if(!p.pin_salt){
      const salt=genSalt();const h=await hashPin(v,salt);
      await sb.from('profiles').update({pin_hash:h,pin_salt:salt}).eq('id',p.id);
      p.pin_hash=h;p.pin_salt=salt;
    }
    pinAttempts[p.id]={count:0,until:0};
    me=p;await loadKidData();
    for(const kid of profiles.filter(pr=>pr.role==='kid'))await reconcileCredits(kid);
    renderMain();
  };
  $('#pin').addEventListener('keydown',e=>{if(e.key==='Enter')$('#pinBtn').click();});
}

function mondayOfThisWeek(){
  const d=new Date();const day=d.getDay();const diff=(day===0?-6:1-day);d.setDate(d.getDate()+diff);return d;
}
function thisWeekDates(){
  const monday=mondayOfThisWeek();
  return [0,1,2,3,4].map(i=>{const d=new Date(monday);d.setDate(d.getDate()+i);return localDateStr(d);});
}

let weekDates=[];
let weekCompletions=[];
let rewardCredits={};
const creditKey=(rewardId,profileId)=>rewardId+'_'+profileId;

async function loadKidData(){
  const dates=thisWeekDates();
  const [{data:ch},{data:rw},{data:comp},{data:week},{data:credits}]=await Promise.all([
    sb.from('chores').select('*').eq('family_id',familyId).eq('archived',false),
    sb.from('rewards').select('*').eq('family_id',familyId).eq('archived',false),
    sb.from('completions').select('*').eq('family_id',familyId).eq('completed_on',today()),
    sb.from('completions').select('*').eq('family_id',familyId).gte('completed_on',dates[0]).lte('completed_on',dates[4]),
    sb.from('reward_credits').select('*').eq('family_id',familyId)
  ]);
  chores=ch||[];rewards=rw||[];
  // chore_id is unique per kid (each chore row belongs to exactly one profile), so a
  // family-wide completions fetch is safe to key purely off chore_id — this also fixes
  // a parent viewing a kid's board: scoping by me.id (the parent) showed everything as
  // undone, since the parent never completes chores themselves.
  doneToday=new Set((comp||[]).map(c=>c.chore_id));
  weekDates=dates;weekCompletions=week||[];
  rewardCredits={};(credits||[]).forEach(c=>rewardCredits[creditKey(c.reward_id,c.profile_id)]=c);
}

function choresForDow(profileId,dow){
  return chores.filter(c=>c.profile_id===profileId && !c.pending && (c.cadence==='daily' || (c.cadence==='weekday' && (c.weekdays||[]).includes(dow))));
}
function visibleChores(profileId){
  return choresForDow(profileId,todayDow());
}
function visibleRewards(profileId){
  return rewards.filter(r=>!r.pending && (r.owner==='both' || r.owner_profile_id===profileId));
}
function todayPoints(profileId){
  return visibleChores(profileId).reduce((s,c)=>s+(doneToday.has(c.id)?c.points:0),0);
}
// Goal progress only counts must-have/nice-to-have chores — stretch tasks are
// bonus and excluded from TV/permission unlock math too, so the goal bar
// shouldn't look "done" off stretch points alone while real chores sit undone.
function todayCorePoints(profileId){
  return visibleChores(profileId).filter(c=>c.category!=='stretch').reduce((s,c)=>s+(doneToday.has(c.id)?c.points:0),0);
}
function todayStretchPoints(profileId){
  return visibleChores(profileId).filter(c=>c.category==='stretch').reduce((s,c)=>s+(doneToday.has(c.id)?c.points:0),0);
}
function weekMissCount(profileId){
  let misses=0;
  for(let i=0;i<5;i++){
    const dateStr=weekDates[i];
    if(dateStr>today())continue;
    const dow=i+1;
    const dayChores=choresForDow(profileId,dow);
    const possible=dayChores.filter(c=>c.points>0).reduce((s,c)=>s+c.points,0);
    const earned=weekCompletions.filter(cm=>cm.completed_on===dateStr && dayChores.some(dc=>dc.id===cm.chore_id)).reduce((s,cm)=>s+cm.points,0);
    if(earned<possible)misses++;
  }
  return misses;
}
function isGated(r){
  return !!(r.requires_all_today||r.requires_perfect_week||r.requires_full_points_excluding||(r.requires_chore_names&&r.requires_chore_names.length));
}
function getCredits(r,k){
  return (rewardCredits[creditKey(r.id,k.id)]||{credits:0}).credits;
}
function periodKeyFor(r){
  return r.requires_perfect_week?weekDates[0]:today();
}
async function maybeAwardCredit(r,k){
  if(!isGated(r))return;
  const key=creditKey(r.id,k.id);
  const row=rewardCredits[key]||{credits:0,last_period_credited:null};
  const pk=periodKeyFor(r);
  if(row.last_period_credited===pk)return;
  const todays=visibleChores(k.id);
  let met=true,usedFreeze=false;
  if(met && r.requires_all_today){
    if(!(todays.length>0 && todays.every(c=>doneToday.has(c.id))))met=false;
  }
  if(met && r.requires_chore_names && r.requires_chore_names.length){
    const doneNames=new Set(todays.filter(c=>doneToday.has(c.id)).map(c=>c.name));
    if(!r.requires_chore_names.every(n=>doneNames.has(n)))met=false;
  }
  if(met && r.requires_full_points_excluding){
    const excl=new Set(r.requires_full_points_excluding);
    const eligible=todays.filter(c=>!excl.has(c.name));
    const possible=eligible.filter(c=>c.points>0).reduce((s,c)=>s+c.points,0);
    const earned=eligible.filter(c=>doneToday.has(c.id)).reduce((s,c)=>s+c.points,0);
    if(earned<possible)met=false;
  }
  if(met && r.requires_perfect_week){
    const misses=weekMissCount(k.id);
    if(misses>1)met=false;
    else if(misses===1){if(!(k.freezes||0))met=false;else usedFreeze=true;}
  }
  if(!met)return;
  const newCredits=row.credits+1;
  const {data,error}=await sb.from('reward_credits')
    .upsert({family_id:familyId,reward_id:r.id,profile_id:k.id,credits:newCredits,last_period_credited:pk},{onConflict:'reward_id,profile_id'})
    .select().single();
  if(!error)rewardCredits[key]=data;
  if(usedFreeze){
    k.freezes=Math.max(0,(k.freezes||0)-1);
    await sb.from('profiles').update({freezes:k.freezes}).eq('id',k.id);
  }
}
async function reconcileCredits(k){
  for(const r of rewards.filter(isGated))await maybeAwardCredit(r,k);
}
function canClaim(r,k){
  if(isGated(r)){
    if(getCredits(r,k)<=0)return false;
    if(r.allowed_weekdays && r.allowed_weekdays.length && !r.allowed_weekdays.includes(todayDow()))return false;
    return k.total_points>=r.cost;
  }
  return k.total_points>=r.cost;
}

// Weekly recap strip — pure read of this week's already-loaded completions.
function recapHtml(k,accent){
  const perDay=weekDates.map(d=>weekCompletions.filter(cm=>cm.profile_id===k.id && cm.completed_on===d).reduce((s,cm)=>s+cm.points,0));
  const weekStars=perDay.reduce((a,b)=>a+b,0);
  const choresDone=weekCompletions.filter(cm=>cm.profile_id===k.id && cm.points>=0).length;
  if(weekStars<=0 && choresDone===0)return '';   // no sad empty card on a fresh week
  const maxDay=Math.max(1,...perDay.map(p=>Math.max(0,p)));
  const labels=['M','T','W','T','F'];
  let bestIdx=-1,bestVal=0;perDay.forEach((p,i)=>{if(p>bestVal){bestVal=p;bestIdx=i;}});
  const bestLabel=bestIdx>=0?['Mon','Tue','Wed','Thu','Fri'][bestIdx]:'—';
  const bars=weekDates.map((d,i)=>{
    const h=Math.round((Math.max(0,perDay[i])/maxDay)*32)+3;
    const isToday=d===today();
    return `<div class="col"><div class="bar" style="height:${h}px;background:${accent};opacity:${isToday?1:.4}"></div><div class="d">${labels[i]}</div></div>`;
  }).join('');
  return `<div class="recap">
    <div class="title">📊 This week so far</div>
    <div class="stat"><b style="color:${accent}">${weekStars}</b><span>⭐ stars</span></div>
    <div class="stat"><b>${choresDone}</b><span>✅ chores</span></div>
    <div class="stat"><b style="font-size:15px">${bestLabel}</b><span>🏆 best day</span></div>
    <div class="spark">${bars}</div>
  </div>`;
}

// A kid's pinned savings goal — a prominent progress strip toward one reward.
function goalHtml(k,accent){
  if(!k.goal_reward_id)return '';
  const r=rewards.find(x=>x.id===k.goal_reward_id && !x.archived && !x.pending);
  if(!r)return '';
  const have=k.total_points,cost=r.cost;
  const pct=Math.max(0,Math.min(100,cost?(have/cost)*100:100));
  const ready=have>=cost;
  const togo=Math.max(0,cost-have);
  return `<div class="goalstrip ${ready?'ready':''}" ${ready?`data-goalclaim="${r.id}"`:''}>
    <div class="gtop"><span class="emo">${r.emoji}</span>
      <span class="lab">Saving up for ${esc(r.name)}<small>${ready?'Ready to claim! 🎉':togo+' ⭐ to go'}</small></span>
      <button class="pin on" data-goalunpin="1" title="Remove goal">📌</button>
    </div>
    <div class="gbar"><div class="gfill" style="width:${pct}%;background:${accent}"></div></div>
    <div class="gnum"><span>${have} ⭐ saved</span><span>${cost} ⭐ goal</span></div>
  </div>`;
}

async function openHistory(k){
  // Detailed daily history for ~3 months; older activity as monthly summaries.
  // (Raw completions are retained 13 months, then rolled into monthly_summaries.)
  const detailStart=new Date();detailStart.setDate(detailStart.getDate()-92);
  const detailStartStr=localDateStr(detailStart);
  const detailMonthStart=detailStartStr.slice(0,8)+'01'; // first day of that month
  const [{data},{data:sums}]=await Promise.all([
    sb.from('completions').select('chore_id,points,completed_on,note,photo_path').eq('profile_id',k.id).gte('completed_on',detailStartStr).order('completed_on',{ascending:false}),
    sb.from('monthly_summaries').select('month,stars,chores').eq('profile_id',k.id).lt('month',detailMonthStart).order('month',{ascending:false})
  ]);
  // Signed URLs for any proof photos (private bucket — short-lived links).
  const photoUrls={};
  const paths=(data||[]).map(c=>c.photo_path).filter(Boolean);
  if(paths.length){
    const {data:signed}=await sb.storage.from('chore-photos').createSignedUrls(paths,3600);
    (signed||[]).forEach(s=>{if(s.signedUrl)photoUrls[s.path]=s.signedUrl;});
  }
  const byDate={};
  (data||[]).forEach(c=>{
    (byDate[c.completed_on]=byDate[c.completed_on]||[]).push(c);
  });
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  const earlier=sums||[];
  app.insertAdjacentHTML('beforeend',`
    <div class="modal open" id="historyModal">
      <div class="sheet">
        <h3><span>📜 ${esc(k.name)}'s history</span><button class="x" id="closeHistory">✕</button></h3>
        <div class="note">Daily detail for the last 3 months. Older activity is kept as monthly summaries.</div>
        ${dates.length?dates.map(d=>{
          const items=byDate[d];
          const dayTotal=items.reduce((s,c)=>s+c.points,0);
          const dateLabel=new Date(d+'T00:00:00').toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long',year:'numeric'});
          return `<div class="note" style="font-weight:800;color:var(--ink);margin-top:14px">${dateLabel} — ${dayTotal>=0?'+':''}${dayTotal} ⭐</div>
          ${items.map(c=>{
            const chore=chores.find(x=>x.id===c.chore_id);
            const purl=c.photo_path&&photoUrls[c.photo_path];
            return `<div class="item"><span class="e">${chore?chore.emoji:'⭐'}</span><span class="t">${c.points>=0?'✅ ':''}${chore?esc(chore.name):'(removed chore)'}<small>${c.points>0?'+':''}${c.points} pts${c.note?' — '+esc(c.note):''}</small></span>${purl?`<img class="histphoto" src="${purl}" data-full="${purl}" alt="proof">`:''}</div>`;
          }).join('')}`;
        }).join(''):'<div class="empty">No recent history yet.</div>'}
        ${earlier.length?`<div class="note" style="font-weight:800;color:var(--ink);margin-top:18px">Earlier months</div>
          ${earlier.map(m=>{
            const ml=new Date(m.month+'T00:00:00').toLocaleDateString(undefined,{month:'long',year:'numeric'});
            return `<div class="item"><span class="e">📅</span><span class="t">${ml}<small>${m.chores} chores · ${m.stars>=0?'+':''}${m.stars} ⭐</small></span></div>`;
          }).join('')}`:''}
      </div>
    </div>`);
  $('#closeHistory').onclick=()=>$('#historyModal').remove();
  document.querySelectorAll('#historyModal .histphoto').forEach(el=>el.onclick=()=>showPhoto(el.dataset.full));
}

async function toggleChore(k,choreId){
  const c=chores.find(x=>x.id===choreId);if(!c)return false;
  if(doneToday.has(choreId)){
    await sb.from('completions').delete().match({profile_id:k.id,chore_id:choreId,completed_on:today()});
    doneToday.delete(choreId);
    k.total_points=Math.max(0,k.total_points-c.points);
    weekCompletions=weekCompletions.filter(cm=>!(cm.chore_id===choreId && cm.completed_on===today()));
  }else{
    let note=null;
    if(c.prompts_note){
      note=prompt(`What did ${k.name} read tonight? (title, pages — optional)`);
      if(note===null)return false;
    }
    let photoPath=null;
    if(c.requires_photo){
      toast('📷 Add a photo to finish this one');
      const file=await capturePhoto();
      if(!file)return false;            // cancelled — don't complete
      photoPath=await uploadChorePhoto(k.id,file);
      if(!photoPath){toast('Photo upload failed — try again');return false;}
    }
    const {error}=await sb.from('completions').insert({family_id:familyId,profile_id:k.id,chore_id:choreId,points:c.points,completed_on:today(),note:note||null,photo_path:photoPath});
    if(error){toast('Could not save — try again');return false;}
    doneToday.add(choreId);
    toast(c.points>0?pickCheer():'Nice — that\'s done ✓');
    k.total_points=Math.max(0,k.total_points+c.points);
    weekCompletions.push({profile_id:k.id,chore_id:choreId,points:c.points,completed_on:today(),note});
    // Any completed task keeps the streak alive — daily-care tasks count too, even
    // though they earn no stars, so kids get credit for showing up.
    if(k.last_active_date!==today()){
      // "Yesterday" must use the same LOCAL calendar date as today()/last_active_date.
      // (Using toISOString() here is UTC and drifts a day in the evening, wrongly
      // resetting streaks for users behind UTC.)
      const y=new Date();y.setDate(y.getDate()-1);
      k.streak=(k.last_active_date===localDateStr(y))?(k.streak||0)+1:1;
      k.last_active_date=today();
    }
  }
  await sb.from('profiles').update({total_points:k.total_points,streak:k.streak,last_active_date:k.last_active_date}).eq('id',k.id);
  await reconcileCredits(k);
  renderMain();
  return true;
}

async function resetToday(k){
  if(!confirm(`Reset ${k.name}'s checklist for today? This removes today's checkmarks and today's points only.`))return;
  const {data:comp}=await sb.from('completions').select('points').eq('profile_id',k.id).eq('completed_on',today());
  const pts=(comp||[]).reduce((s,c)=>s+c.points,0);
  k.total_points=Math.max(0,k.total_points-pts);
  await sb.from('profiles').update({total_points:k.total_points}).eq('id',k.id);
  await sb.from('completions').delete().eq('profile_id',k.id).eq('completed_on',today());
  doneToday=new Set([...doneToday].filter(id=>!chores.some(c=>c.id===id && c.profile_id===k.id)));
  weekCompletions=weekCompletions.filter(cm=>!(cm.profile_id===k.id && cm.completed_on===today()));
  $('#modal').remove();
  toast(`${k.name}'s today reset`);
  renderMain();
}

async function redeem(k,rewardId){
  const r=rewards.find(x=>x.id===rewardId);if(!r||!canClaim(r,k))return;
  k.total_points=Math.max(0,k.total_points-r.cost);
  await sb.from('profiles').update({total_points:k.total_points}).eq('id',k.id);
  if(isGated(r)){
    const key=creditKey(r.id,k.id);
    const row=rewardCredits[key];
    const newCredits=Math.max(0,(row?row.credits:0)-1);
    await sb.from('reward_credits').update({credits:newCredits}).eq('reward_id',r.id).eq('profile_id',k.id);
    if(row)row.credits=newCredits;
  }
  // Claiming the pinned goal completes it — clear so a new goal can be set.
  if(k.goal_reward_id===r.id){
    k.goal_reward_id=null;
    const prof=profiles.find(p=>p.id===k.id);if(prof)prof.goal_reward_id=null;
    await sb.from('profiles').update({goal_reward_id:null}).eq('id',k.id);
  }
  toast(`${k.name} redeemed ${r.name}! ${r.emoji}`);
  await sb.from('redemptions').insert({family_id:familyId,profile_id:k.id,reward_id:r.id,cost:r.cost});
  renderMain();
}

async function proposeChore(k){

  const emo=prompt("Pick an emoji for it (optional):","⭐")||'⭐';

    const [{data:recent},{data:notesData}]=await Promise.all([
      sb.from('completions').select('chore_id,points').eq('profile_id',focusKid.id).gte('completed_on',localDateStr(since)),
      sb.from('completions').select('chore_id,note,completed_on').eq('profile_id',focusKid.id).not('note','is',null).order('completed_on',{ascending:false})
    ]);
    (recent||[]).forEach(c=>{counts[c.chore_id]=(counts[c.chore_id]||0)+1;});
    graduationCandidates=chores.filter(c=>c.profile_id===focusKid.id && c.points>0 && (counts[c.id]||0)>=21);
    pendingChores=chores.filter(c=>c.profile_id===focusKid.id && c.pending);
    notes=(notesData||[]).map(n=>({...n,choreName:(chores.find(c=>c.id===n.chore_id)||{}).name||'—'}));
  }
  const kidLabel=focusKid?esc(focusKid.name):'—';
  const pendingRewards=rewards.filter(r=>r.pending); // family-wide, any kid
  const approvalCount=pendingChores.length+pendingRewards.length;

  app.insertAdjacentHTML('beforeend',`
    <div class="modal open" id="modal">
      <div class="sheet">
        <h3><span>⚙️ Parent settings</span><button class="x" id="closeAdmin">✕</button></h3>
        <div class="tabbar">
          <button data-tab="chores" class="on">Chores</button>
          <button data-tab="rewards">Rewards</button>
          <button data-tab="family">Family</button>
          <button data-tab="approvals">Approvals${approvalCount?' ('+approvalCount+')':''}</button>
          <button data-tab="notes">Notes</button>
          <button data-tab="pins">PINs</button>
        </div>
        <div class="panel on" id="panel-chores">
          ${focusKid?'':'<div class="empty">Add a child in the Family tab first.</div>'}
          ${focusKid?`
          ${graduationCandidates.length?`<div class="note" style="color:var(--good);font-weight:800">🎓 Ready to graduate (21+ days in the last month):</div>
          <div id="gradList">${graduationCandidates.map(c=>`
            <div class="item"><span class="e">${c.emoji}</span><span class="t">${esc(c.name)}<small>${counts[c.id]} days done</small></span>
            <button class="del" style="background:var(--good-bg);color:var(--good)" data-grad="${c.id}">🎉</button></div>`).join('')}</div>`:''}
          <div class="note">Editing chores for <b>${kidLabel}</b>${kids.length>1?' — switch kid in the Family tab':''}.</div>
          <div id="choreList"></div>
          <div class="addform"><input id="cEmo" class="emoji-in" data-kind="chore" readonly placeholder="⭐" maxlength="2"><input id="cName" placeholder="Chore name"><input id="cPts" inputmode="numeric" placeholder="+5"></div>
          <div class="note" style="margin:0 4px 4px;color:var(--muted)">Tip: set points to <b>0</b> for a <b>daily-care</b> task — tapped off and streak-building, but no stars. Flip any task later with the 🩵/⭐ button.</div>
          <label class="toggle" style="margin:2px 4px 4px"><input type="checkbox" id="cPhoto"> 📷 Require a photo to complete</label>
          <button class="addbtn" id="addChore">＋ Add chore</button>
          <div class="rowbtns"><button class="danger" id="resetTodayBtn">↺ Reset ${kidLabel}'s today</button></div>`:''}
        </div>
        <div class="panel" id="panel-approvals">
          <div class="note" style="color:var(--ink);font-weight:800">Proposed chores</div>
          <div id="pendingList">${pendingChores.length?pendingChores.map(c=>`
            <div class="item"><span class="e">${c.emoji}</span><span class="t">${esc(c.name)}<small>${c.points} pts proposed</small></span>
            <button class="del" style="background:var(--good-bg);color:var(--good)" data-approve="${c.id}">✓</button>
            <button class="del" data-reject="${c.id}">✕</button></div>`).join(''):'<div class="empty">No pending chores.</div>'}</div>
          <div class="note" style="color:var(--ink);font-weight:800;margin-top:12px">Proposed rewards <span style="font-weight:700;color:var(--muted)">— set a cost, then approve</span></div>
          <div id="pendingRewardList">${pendingRewards.length?pendingRewards.map(r=>{
            const by=(profiles.find(p=>p.id===r.proposed_by)||{}).name||'a kid';
            return `<div class="item"><span class="e">${r.emoji}</span><span class="t">${esc(r.name)}<small>wished by ${esc(by)}</small></span>
            <input data-rcost="${r.id}" placeholder="Cost ⭐" inputmode="numeric" maxlength="5" style="width:74px;border:2px solid var(--line);border-radius:10px;padding:8px;font-weight:700">
            <button class="del" style="background:var(--good-bg);color:var(--good)" data-approver="${r.id}">✓</button>
            <button class="del" data-rejectr="${r.id}">✕</button></div>`;
          }).join(''):'<div class="empty">No pending rewards.</div>'}</div>
        </div>
        <div class="panel" id="panel-notes">
          <div class="note">${kidLabel}'s reading log and any other notes, newest first.</div>
          <div id="notesList">${notes.length?notes.map(n=>`
            <div class="item"><span class="e">📖</span><span class="t">${n.completed_on} — ${esc(n.choreName)}<small>${esc(n.note)}</small></span></div>`).join(''):'<div class="empty">No notes yet.</div>'}</div>
        </div>
        <div class="panel" id="panel-rewards">
          <div class="note">Rewards are shared across all kids unless tied to one.</div>
          <div id="rewardList"></div>
          <div class="addform"><input id="rEmo" class="emoji-in" data-kind="reward" readonly placeholder="🎁" maxlength="2"><input id="rName" placeholder="Reward name"><input id="rCost" placeholder="50"></div>
          <div class="rewardopts">
            <select id="rTier">
              <option value="instant">⚡ Same-day</option>
              <option value="weekly" selected>📆 Weekly</option>
              <option value="monthly">🏆 Monthly / Saver</option>
            </select>
            <select id="rOwner">
              <option value="both" selected>Shared — all kids</option>
              ${kids.map(kk=>`<option value="${kk.id}">${esc(kk.name)} only</option>`).join('')}
            </select>
          </div>
          <button class="addbtn" id="addReward">＋ Add reward</button>
        </div>
        <div class="panel" id="panel-family">
          <div class="note">Add or remove kids and parents. Each kid gets their own chore board.</div>
          <div id="familyList"></div>
          <div class="note" style="margin-top:10px;color:var(--ink);font-weight:800">Add a child</div>
          <div class="addform four"><input id="fkEmo" class="emoji-in" data-kind="person" readonly placeholder="🦄" maxlength="2"><input id="fkName" placeholder="Name"><input id="fkAge" placeholder="Age" inputmode="numeric"><input id="fkPin" placeholder="PIN (4, opt)" inputmode="numeric" maxlength="4"></div>
          <button class="addbtn" id="addKidBtn">＋ Add child</button>
          <div class="note" style="margin-top:12px;color:var(--ink);font-weight:800">Add a parent</div>
          <div class="addform"><input id="fpEmo" class="emoji-in" data-kind="person" readonly placeholder="🧑" maxlength="2"><input id="fpName" placeholder="Name"><input id="fpPin" placeholder="PIN (6)" inputmode="numeric" maxlength="6"></div>
          <button class="addbtn" id="addParentBtn">＋ Add parent</button>
        </div>
        <div class="panel" id="panel-pins">
          <div class="note">Change anyone's PIN. Parents use 6 digits, kids 4. Leave blank + Save to remove a kid's PIN.</div>
          <div id="pinList"></div>
        </div>
      </div>
    </div>`);
  $('#closeAdmin').onclick=()=>$('#modal').remove();
  if(focusKid)$('#resetTodayBtn').onclick=()=>resetToday(focusKid);
  document.querySelectorAll('.tabbar button').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.tabbar button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));$('#panel-'+b.dataset.tab).classList.add('on');
  });

  if(focusKid){
    const allHerChores=chores.filter(c=>c.profile_id===focusKid.id && !c.pending);
    $('#choreList').innerHTML=allHerChores.length?allHerChores.map(c=>`
      <div class="item"><span class="e">${c.emoji}</span><span class="t">${esc(c.name)}<small>${c.points>0?('+'+c.points+' pts'):'🩵 Daily care · no stars'}${c.requires_photo?' · 📷 photo':''}${c.weekdays&&c.weekdays.length?' · '+c.weekdays.map(d=>['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d]).join('/'):''}</small></span><button class="del" data-carec="${c.id}" title="${c.points>0?'Make this daily care (no stars)':'Make this earn stars'}">${c.points>0?'🩵':'⭐'}</button><button class="del" data-delc="${c.id}">🗑️</button></div>`).join(''):'<div class="empty">No chores yet.</div>';
    document.querySelectorAll('[data-carec]').forEach(el=>el.onclick=async()=>{
      const c=chores.find(x=>x.id===el.dataset.carec);if(!c)return;
      const np=c.points>0?0:5;   // → daily care, or back to a default star value
      await sb.from('chores').update({points:np}).eq('id',c.id);
      c.points=np;$('#modal').remove();openAdmin(focusKid);renderMain();
      toast(np>0?'Now earns +5 ⭐':'Now daily care — no stars');
    });
    document.querySelectorAll('[data-delc]').forEach(el=>el.onclick=async()=>{
      await sb.from('chores').update({archived:true}).eq('id',el.dataset.delc);
      chores=chores.filter(c=>c.id!==el.dataset.delc);$('#modal').remove();openAdmin(focusKid);
    });
    document.querySelectorAll('[data-grad]').forEach(el=>el.onclick=async()=>{
      const id=el.dataset.grad;
      await sb.from('chores').update({archived:true,graduated_at:new Date().toISOString()}).eq('id',id);
      chores=chores.filter(c=>c.id!==id);
      toast('🎉 Graduated! That habit is hers now.');
      $('#modal').remove();openAdmin(focusKid);renderMain();
    });
    document.querySelectorAll('[data-approve]').forEach(el=>el.onclick=async()=>{
      const id=el.dataset.approve;
      await sb.from('chores').update({pending:false}).eq('id',id);
      const c=chores.find(x=>x.id===id);if(c)c.pending=false;
      toast('Approved!');$('#modal').remove();openAdmin(focusKid);renderMain();
    });
    document.querySelectorAll('[data-reject]').forEach(el=>el.onclick=async()=>{
      const id=el.dataset.reject;
      await sb.from('chores').update({archived:true}).eq('id',id);
      chores=chores.filter(c=>c.id!==id);
      toast('Rejected');$('#modal').remove();openAdmin(focusKid);
    });
    $('#addChore').onclick=async()=>{
      const nm=$('#cName').value.trim();if(!nm)return toast('Type a chore name');
      let p=parseInt($('#cPts').value,10);if(isNaN(p))p=5;
      const {data,error}=await sb.from('chores').insert({family_id:familyId,profile_id:focusKid.id,emoji:$('#cEmo').value.trim()||'⭐',name:nm,points:p,cadence:'daily',requires_photo:$('#cPhoto').checked}).select().single();
      if(error)return toast('Could not add chore');
      chores.push(data);$('#modal').remove();openAdmin(focusKid);renderMain();toast('Chore added');
    };
  }

  const liveRewards=rewards.filter(r=>!r.pending);
  $('#rewardList').innerHTML=liveRewards.length?liveRewards.map(r=>{
    const ownerLabel=r.owner==='profile'?((profiles.find(p=>p.id===r.owner_profile_id)||{}).name||'one kid')+' only':'shared';
    return `<div class="item"><span class="e">${r.emoji}</span><span class="t">${esc(r.name)}<small>${r.cost} pts · ${r.tier} · ${esc(ownerLabel)}</small></span><button class="del" data-delr="${r.id}">🗑️</button></div>`;
  }).join(''):'<div class="empty">No rewards yet.</div>';
  document.querySelectorAll('[data-delr]').forEach(el=>el.onclick=async()=>{
    await sb.from('rewards').update({archived:true}).eq('id',el.dataset.delr);
    rewards=rewards.filter(r=>r.id!==el.dataset.delr);$('#modal').remove();openAdmin(focusKid);
  });
  // Approve / reject kid-proposed rewards
  document.querySelectorAll('[data-approver]').forEach(el=>el.onclick=async()=>{
    const id=el.dataset.approver;
    let c=parseInt((document.querySelector(`[data-rcost="${id}"]`)||{}).value,10);if(isNaN(c)||c<0)c=50;
    await sb.from('rewards').update({pending:false,cost:c}).eq('id',id);
    const r=rewards.find(x=>x.id===id);if(r){r.pending=false;r.cost=c;}
    toast('Reward approved! 🎁');$('#modal').remove();openAdmin(focusKid);renderMain();
  });
  document.querySelectorAll('[data-rejectr]').forEach(el=>el.onclick=async()=>{
    const id=el.dataset.rejectr;
    await sb.from('rewards').update({archived:true}).eq('id',id);
    rewards=rewards.filter(r=>r.id!==id);
    toast('Reward declined');$('#modal').remove();openAdmin(focusKid);
  });
  $('#addReward').onclick=async()=>{
    const nm=$('#rName').value.trim();if(!nm)return toast('Type a reward name');
    let c=parseInt($('#rCost').value,10);if(isNaN(c)||c<0)c=50;
    const tier=$('#rTier').value;
    const ownerSel=$('#rOwner').value;
    const toOneKid=ownerSel!=='both';
    const {data,error}=await sb.from('rewards').insert({
      family_id:familyId,
      owner:toOneKid?'profile':'both',
      owner_profile_id:toOneKid?ownerSel:null,
      emoji:$('#rEmo').value.trim()||'🎁',name:nm,cost:c,tier
    }).select().single();
    if(error)return toast('Could not add reward');
    rewards.push(data);$('#modal').remove();openAdmin(focusKid);renderMain();toast('Reward added');
  };

  // ── Family tab: manage profiles ──
  $('#familyList').innerHTML=profiles.map(p=>{
    const isLastParent=p.role==='parent' && profiles.filter(x=>x.role==='parent').length<=1;
    const removable=!(p.id===me.id || isLastParent);
    return `<div class="item"><span class="e">${p.emoji}</span><span class="t">${esc(p.name)}<small>${p.role}${p.age?' · age '+p.age:''}${p.pin_hash?' · 🔒 PIN':' · no PIN'}</small></span>
      ${removable?`<button class="del" data-delp="${p.id}">🗑️</button>`:'<span style="font-size:11px;color:var(--muted);font-weight:800">'+(p.id===me.id?'you':'last parent')+'</span>'}</div>`;
  }).join('');
  document.querySelectorAll('[data-delp]').forEach(el=>el.onclick=async()=>{
    const id=el.dataset.delp;
    const prof=profiles.find(p=>p.id===id);
    if(!confirm(`Remove ${prof?prof.name:'this profile'}? Their chores and history go too. This can't be undone.`))return;
    await sb.from('profiles').delete().eq('id',id);
    await loadProfiles();
    $('#modal').remove();openAdmin(focusKid&&focusKid.id!==id?focusKid:null);renderMain();
  });
  $('#addKidBtn').onclick=async()=>{
    const nm=$('#fkName').value.trim();if(!nm)return toast('Type the child\'s name');
    const age=parseInt($('#fkAge').value,10)||null;
    const pin=$('#fkPin').value.trim();
    if(pin && pin.length!==4)return toast('Kid PIN must be 4 digits (or leave blank)');
    const band=age?bandForAge(age).key:'7-9';
    const kSalt=pin?genSalt():null;
    const {data,error}=await sb.from('profiles').insert({
      family_id:familyId,name:nm,emoji:$('#fkEmo').value.trim()||'🦄',role:'kid',
      age,daily_goal:DEFAULT_GOAL_BY_BAND[band],pin_hash:pin?await hashPin(pin,kSalt):null,pin_salt:kSalt,
      color:colorForKidIndex(profiles.filter(p=>p.role==='kid').length)
    }).select().single();
    if(error)return toast('Could not add child');
    profiles.push(data);$('#modal').remove();openAdmin(data);renderMain();toast(`${nm} added`);
  };
  $('#addParentBtn').onclick=async()=>{
    const nm=$('#fpName').value.trim();if(!nm)return toast('Type the parent\'s name');
    const pin=$('#fpPin').value.trim();
    if(pin.length!==6)return toast('Parent PIN must be 6 digits');
    const pSalt=genSalt();
    const {data,error}=await sb.from('profiles').insert({
      family_id:familyId,name:nm,emoji:$('#fpEmo').value.trim()||'🧑',role:'parent',
      daily_goal:0,pin_hash:await hashPin(pin,pSalt),pin_salt:pSalt
    }).select().single();
    if(error)return toast('Could not add parent');
    profiles.push(data);$('#modal').remove();openAdmin(focusKid);renderMain();toast(`${nm} added`);
  };

  // ── PINs tab ──
  $('#pinList').innerHTML=profiles.map(p=>{
    const len=p.role==='parent'?6:4;
    return `<div class="item"><span class="e">${p.emoji}</span><span class="t">${esc(p.name)}<small>${p.role} · ${len}-digit</small></span>
      <input data-pinfor="${p.id}" placeholder="New ${len}-digit PIN" maxlength="${len}" inputmode="numeric" style="width:120px;border:2px solid var(--line);border-radius:10px;padding:8px;font-weight:700">
      <button class="del" style="background:var(--accent);color:#fff" data-savepin="${p.id}">Save</button>
    </div>`;
  }).join('');
  document.querySelectorAll('[data-savepin]').forEach(el=>el.onclick=async()=>{
    const id=el.dataset.savepin;
    const prof=profiles.find(p=>p.id===id);
    const input=document.querySelector(`[data-pinfor="${id}"]`);
    const v=input.value.trim();
    const len=prof.role==='parent'?6:4;
    if(v===''){ // blank = remove PIN, but parents must keep one
      if(prof.role==='parent')return toast('Parents must keep a PIN');
      await sb.from('profiles').update({pin_hash:null,pin_salt:null}).eq('id',id);
      prof.pin_hash=null;prof.pin_salt=null;input.value='';return toast('PIN removed');
    }
    if(v.length!==len)return toast(`PIN must be ${len} digits`);
    const salt=genSalt();const hash=await hashPin(v,salt);
    await sb.from('profiles').update({pin_hash:hash,pin_salt:salt}).eq('id',id);
    prof.pin_hash=hash;prof.pin_salt=salt;
    input.value='';toast('PIN updated');
  });
}

// Register the service worker so Kudos is an installable PWA (Add to Home Screen).
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

boot();
</script>
</body>
</html>
